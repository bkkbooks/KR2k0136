body:
  text: 佛國記宋釋法顯撰法顯昔在長安慨律藏殘缺於是遂以𢎞始二年歳在己亥與慧景道整慧應慧嵬等同契至天竺尋求戒律初發跡長安度隴至乾歸國夏坐夏坐訖前行至耨檀國度養樓山至張掖鎮張掖大亂道路不通張掖王慇懃遂留爲作檀越於是與智嚴慧簡僧紹寶雲僧景等相遇欣於同志便共夏坐夏坐訖復進到燉煌有塞東西可八十里南北四十里共停一月餘日法顯等五人隨使先發復與寳雲等别燉煌太守李浩供給度沙河沙河中多有惡鬼熱風遇則皆死無一全者上無飛鳥下無走獸遍望極目欲求度處則莫知所擬唯以死人枯骨爲標幟耳行十七日計可千五百里得至鄯善國其地﨑嶇薄瘠俗人衣服麤與漢地同但以氈褐爲異其國王奉法可有四千餘僧悉小乘學諸國俗人及沙門盡行天竺法但有精麤從此西行所經諸國類皆如是唯國國言語不同然出家人皆習天竺書天竺語住此一月日復西北行十五日到夷國夷國僧亦有四千餘人皆小乘學法則齊整秦土沙門至彼都不預其僧例法顯得符行堂公孫經理住二月餘日於是還與寶雲等共爲夷國人不修禮義遇客甚薄智嚴慧簡慧嵬遂返向髙昌欲求行資法顯等䝉符公孫供給遂得直進西南行路中無居民涉行艱難所經之苦人理莫比在道一月五日得到于闐其國豐樂人民殷盛盡皆奉法以法樂相娛衆僧乃數萬人多大乘學皆有衆食彼國人民星居家家門前皆起小塔最小者可髙二丈許作四方僧房供給客僧及餘所須國主安堵法顯等於僧伽藍僧伽藍名瞿摩帝是大乘寺三千僧共犍槌食入食堂時威儀齊肅次第而坐一切寂然器鉢無聲淨人益食不得相喚但以手指麾慧景道整慧達先發向竭义國法顯等欲觀行像停三月日其國中十四大僧伽藍不數小者從四月一日城裏便掃灑道路荘嚴巷陌其城門上張大幃幕事事嚴飾王及夫人采女皆住其中瞿摩帝僧是大乗學王所敬重最先行像離城三四里作四輪像車髙三丈餘狀如行殿七寶莊校懸繒幡盖像立車中二菩薩侍作諸天侍從皆金銀彫瑩懸於虚空像去門百步王脱天冠易著新衣徒跣持華香翼從出城迎像頭面禮足散華燒香像入城時門樓上夫人采女遥散衆華紛紛而下如是莊嚴供具車車各異一僧伽藍則一日行像四月一日爲始至十四日行像乃訖行像訖王及夫人乃還宫耳其城西七八里有僧伽藍名王新寺作來八十年經三王方成可髙二十五丈彫文刻鏤金銀覆上衆寶合成塔後作佛堂莊嚴妙好梁柱戸扇窻牖皆以金薄别作僧房亦嚴麗整飾非言可盡嶺東六國諸王所有上價寶物多作供養人用者少既過四月行像僧紹一人隨胡道人向􅄢賓法顯等進向子合國在道二十五日便到其國國王精進有千餘僧多大乗學住此十五日已於是南行四日入葱嶺山到於麾國安居安居已止行二十五日到竭义國與慧景等合值其國王作般􅃒越師般􅃒越師漢言五年大㑹也會時請四方沙門皆來雲集已莊嚴衆僧坐處懸繒旛葢作金銀蓮華著繒座後鋪淨坐具王及羣臣如法供養或一月二月或三月多在春時王作㑹已復勸諸羣臣設供供養或一日二日三日五日供養都畢王以所乗馬鞍勒自副使國中貴重臣騎之并諸白㲲種種珍寳沙門所須之物共諸羣臣發願布施布施已還從僧贖其地山寒不生餘穀唯熟麥耳衆僧受歳已其晨輒霜故其王毎讃衆僧令麥熟然後受歳其國中有佛唾壺以石作色似佛鉢又有佛一齒國人爲佛齒起塔有千餘僧盡小乗學自山以東俗人被服麤類秦土亦以氈褐爲異沙門法用轉轉勝不可具記其國當葱嶺之中自葱嶺已前草木果實皆異唯竹及安石榴甘蔗三物與漢地同耳從此西行向北天竺在道一月得度葱嶺葱嶺冬夏有雪又有毒龍若失其意則吐毒風雨雪飛沙礫石遇此難者萬無一全彼土人人即名為雪山人也度嶺已到北天竺始入其境有一小國名陀歴亦有衆僧皆小乗學其國昔有羅漢以神足力將一巧匠上兠術天觀彌勒菩薩長短色貌還下刻木作像前後三上觀然後乃成像長八丈足趺八尺齋日常有光眀諸國王競興供養今故現在於此順嶺西南行十五日其道艱阻崖岸險絶其山唯石壁立千仞臨之目眩欲進則投足無所下有水名新頭河昔人有鑿石通路施傍梯者凡度七百度梯已躡懸絙過河河兩岸相去減八十步九驛所記漢之張騫甘英皆不至衆僧問法顯佛法東過其始可知耶顯云訪問彼土人皆云古老相傳自立彌勒菩薩像後便有天竺沙門齎經律過此河者像立在佛泥洹後三百許年計於周氏平王時由兹而言大教宣流始自此像非夫彌勒大士繼軌釋迦孰能令三寳宣通邊人識法固知冥運之開本非人事則漢明之夢有由而然矣渡河便到烏萇國烏萇國是正北天竺也盡作中天竺語中天竺所謂中國俗人衣服飲食亦與中國同佛法甚盛名衆僧住止處爲僧伽藍凡有五百僧伽藍皆小乗學若有客比丘到悉供養三日三日過已乃令自求所安常傳言佛至北天竺即到此國已佛遺足跡於此跡或長或短在人心念至今猶爾及曬衣石度惡龍處亦悉現在石髙丈四闊二丈許一邊平慧景道整慧達三人先發向佛影那竭國法顯等住此國夏坐坐訖南下到宿呵多國其國佛法亦盛昔天帝釋試菩薩化作鷹鴿割肉貿鴿處佛即成道與諸弟子遊行語云此本是吾割肉貿鴿處國人由是得知於此處起塔金銀校飾從此東下五日行到犍陀衛國是阿育王子法益所治處佛爲菩薩時亦於此國以眼施人其處亦起大塔金銀校飾此國人多小乗學自此東行七日有國名竺刹尸羅竺刹尸羅漢言截頭也佛爲菩薩時於此處以頭施人故因以爲名復東行二日至投身餧餓虎處此二處亦起大塔皆衆寳校飾諸國王臣民競興供養散華然燈相繼不絶通上二塔彼方人亦名為四大塔也從犍陀衛國南行四日到弗樓沙國佛昔將諸弟子遊行此國語阿難云吾般泥洹後當有國王名􅄢膩伽於此處起塔後膩伽王出世出行遊觀時天帝釋欲開發其意化作牧牛小兒當道起塔王問言汝作何等答曰作佛塔王言大善於是王即於小兒塔上起塔髙四十餘丈衆寳校飾凡所經見塔廟壯麗威嚴都無此比傳云閻浮提塔唯此爲上王作塔成已小塔即自傍出大塔南髙三尺許佛鉢即在此國昔月氏王大興兵衆來伐此國欲取佛鉢既伏此國已月氏王篤信佛法欲持鉢去故興供養供養三寶畢乃校飭大象置鉢其上象便伏地不能得前更作四輪車載鉢八象共牽復不能進王知與鉢縁未至深自愧歎即於此處起塔及僧伽藍并留鎮守種種供養可有七百餘僧日將中衆僧則出鉢與白衣等種種供養然後中食至暮燒香時復爾可容二斗許雜色而黑多四際分明厚可二分瑩徹光澤貧人以少華投中便滿有大富者欲以多華而供養正復百千萬斛終不能滿寳雲僧景只供養佛鉢便還慧景慧達道整先向那竭國供養佛影佛齒及頂骨慧景病道整住㸔慧逹一人還於弗樓沙國相見而慧逹寳雲僧景遂還秦土慧景應在佛鉢寺無常由是法顯獨進向佛頂骨所西行十六由延便至那竭國界醯羅城中有佛頂骨精舍盡以金薄七寳校飾國王敬重頂骨慮人抄奪乃取國中豪姓八人人持一印印封守護清晨八人俱到各視其印然後開戸開戸已以香汁洗手出佛頂骨置精舎外髙座上以七寳圓碪碪下琉璃鍾覆上皆珠璣校飾骨黃白色方圓四寸其上隆起每日出後精舎人則登高樓擊大鼓吹螺敲銅鈸王聞已則詣精舎以華香供養供養已次第頂戴而去從東門入西門出王朝朝如是供養禮拜然後聽國政居士長者亦先供養乃修家事日日如是初無懈惓供養都訖乃還頂骨於精舎中有七寳解脱塔或開或閉髙五尺許以盛之精舎門前朝朝恒有賣華香人凡欲供養者種種買焉諸國王亦恒遣使供養精舎處方四十步雖復天震地裂此處不動從此北行一由延到那竭國城是菩薩本以銀錢貿五莖華供養定光佛處城中亦有佛齒塔供養如頂骨法城東北一由延到一谷口有佛錫杖亦起精舎供養杖以牛頭栴檀作長丈六七許以木筒盛之正復百千人舉不能移入谷口四日西行有佛僧伽梨精舎供養彼國土亢旱府國人相率出衣禮拜供養天即大雨那竭城南半由延有石室博山西南向佛留影此中去十餘步觀之如佛真形金色相好光眀炳著轉近轉㣲髣髴如有諸方國王遣工畫師模寫莫能及彼國人傳云千佛盡當於此留影影西百步許佛在時剃髮翦爪佛自與諸弟子共造塔髙七八丈以爲將來塔法今猶在邊有寺寺中有七百餘僧此處有諸羅漢辟支佛塔乃千數住此冬二月法顯等三人南度小雪山雪山冬夏積雪山北陰中過寒暴起人皆噤戰慧景一人不堪復進口出白沬語法顯云我亦不復活便可時去勿得俱死於是遂終法顯撫之悲號本圗不果命也奈何復自力前得過嶺南到羅夷國近有三千僧兼大小乗學住此夏坐坐訖南下行十日到跋那國亦有三千許僧皆小乗學從此東行三日復渡新頭河兩岸皆平地過河有國名毗荼佛法興盛兼大小乗學見秦道人往乃大憐愍作是言如何邊地人能知出家爲道遠求佛法悉供給所須待之如法從此東南行減八十由延經歴諸寺甚多僧衆萬數過是諸處已到一國國名摩頭羅又經捕那河河邊左右有二十僧伽藍可有三千僧佛法轉盛凡沙河已西天竺諸國國王皆篤信佛法供養衆僧時則脱天冠共諸宗親羣臣手自行食行食已鋪氊於地對上座前坐於衆僧前不敢坐床佛在世時諸王供養法式相傳至今從是以南名爲中國中國寒暑調和無霜雪人民殷樂無戸籍官法唯耕王地者乃輸地利欲去便去欲住便住王治不用刑罔有罪者但罰其錢隨事輕重雖復謀爲惡逆不過截右手而已王之侍衛左右皆有供禄舉國人民悉不殺生不飲酒不食葱蒜唯除旃茶羅旃茶羅名爲惡人與人别居若入城市則擊木以自異人則識而避之不相搪揬國中不養豬雞不賣生口市無屠行及酤酒者貨易則用貝齒唯旃茶羅獵師賣肉耳自佛般泥洹後諸國王長者居士爲衆僧起精舎供養供給田宅園圃民戸牛犢鐡劵書録後王王相傳無敢廢者至今不絶衆僧住止房舎床褥飲食衣服都無缺乏處處皆爾衆僧常以作功徳為業及誦經坐禪客僧往到舊僧迎逆代擔衣鉢給洗足水塗足油與非時漿須臾息已復問其臘數次第得房舎臥具種種如法衆僧住處作舎利弗塔目連阿難塔并阿毗曇律經塔安居後一月諸希福之家勸化供養僧作非時漿衆僧大會説法說法已供養舎利弗塔種種香華通夜然燈使彼人作舎利弗本婆羅門時詣佛求出家大目連大迦葉亦如是諸比丘尼多供養阿難塔以阿難請世尊聽女人出家故諸沙彌多供養羅云阿毗曇師者供養阿毗曇律師者供養律年年一供養各自有日摩訶衍人則供養般若波羅蜜文殊師利觀世音等衆僧受歳竟長者居士婆羅門等各持種種衣物沙門所須以布施僧衆僧亦自各各布施佛泥洹已來聖衆所行威儀法則相承不絶自渡新頭河至南天竺迄於南海四五萬里皆平坦無大山川正有河水從此東南行十八由延有國名僧伽施佛上忉利天三月爲母說法來下處佛上忉利天以神通力都不使諸弟子知未滿七日乃放神足阿那律以天眼遙見世尊即語尊者大目連汝可往問訊世尊目連即往頭面禮足共相問訊問訊已佛語目連吾却後七日當下閻浮提目連既還於時八國大王及諸臣民不見佛久咸皆渇仰雲集此國以待世尊時優鉢羅比丘尼即自心念今日國王臣民皆當奉迎佛我是女人何由得先見佛即以神足化作轉輪聖王最前禮佛佛從忉利天上來向下下時化作三道寶階佛在中道七寶階上行梵天王亦化作白銀階在右邊執白拂而侍天帝釋化作紫金階在左邊執七寶葢而侍諸天無數從佛下佛既下三階俱沒於地餘有七級現後阿育王欲知其根際遣人掘看下至黃泉根猶不盡王益信敬即於階上起精舎當中階作丈六立像精舎後立石柱髙三十肘上作師子柱内四邊有佛像内外映徹淨若琉璃有外道論師與沙門諍此住處時沙門理屈於是共立誓言此處若是沙門住處者今當有靈驗作是言已柱頭師子乃大鳴吼見證於是外道懼怖心伏而退佛以受天食三月故身作天香不同世人即便浴身後人於此處起浴室浴室猶在優鉢羅比丘尼初禮佛處今亦起塔佛在世時有翦髮爪作塔及過去三佛并釋迦文佛坐處經行處及作諸佛形像處盡有塔今悉在天帝釋梵天王從佛下處亦起塔此處僧及尼可有千人皆同衆食雜大小乗學住處一白耳龍與此衆僧作檀越令國内豐熟雨澤以時無諸災害使衆僧得安衆僧感其惠故為作龍舎敷置坐處又為龍設福食供養衆僧日日衆中别差三人到龍舎中食每至夏坐訖龍輒化形作一小蛇兩耳邊白衆僧識之銅盂盛酪以龍置中從上座至下座行之似若問訊遍便化去年年一出其國豐饒人民熾盛最樂無比諸國人來無不經理供給所須寺北五十由延有一寺名火境火境者惡鬼名也佛本化是惡鬼後人於此處起精舎以精舎布施阿羅漢以水灌手水瀝滴地其處故在正復掃除常現不滅此處别有佛塔善鬼神常掃灑初不須人工有邪見國王言汝能如是者我當多將兵衆住此益積糞穢汝復能除不鬼神即起大風吹之令淨此處有百枚小塔人終日數之不能得知若至意欲知者便一塔邊置一人已復計數人人或多或少其不可得知有一僧伽藍可六七百僧此中有辟支佛食處泥洹地大如車輪餘處生草此處獨不生乃曬衣地處亦不生草衣條著地跡今故現在法顯住龍精舎夏坐坐訖東南行七由延到􅄢饒夷城城接恒水有二僧伽藍盡小乗學去城西六七里恒水北岸佛為諸弟子説法處傳云説無常苦説身如泡沫等此處起塔猶在度恒水南行三由延到一林名呵梨佛於此中説法經行坐處盡起塔從此東南行十由延到沙祗大國出沙祇城南門道東佛本在此嚼楊枝刺土中即生長七尺不增不減諸外道婆羅門嫉妬或斫或拔遠棄之其處續生如故此中亦有四佛經行坐處起塔故在從此南行八由延到拘薩羅國舎衛城城内人民稀曠都有二百餘家即波斯匿王所治城也大愛道故精舎處須達長者井壁及鴦掘魔得道般泥洹燒身處後人起塔皆在此城中諸外道婆羅門生嫉妬心欲毁壞之天即雷電霹靂終不能得壞出城南門千二百步道西長者須達起精舎精舎東向開門戸兩廂有二石柱左柱上作輪形右柱上作牛形池流清淨林木尚茂衆華異色蔚然可觀即所謂祇洹精舎也佛上忉利天爲母説法九十日波斯匿王思見佛即刻牛頭栴檀作佛像置佛坐處佛後還入精舎像即避出迎佛佛言還坐吾般泥洹後可為四部衆作法式像即還坐此像最是衆像之始後人所法者也佛於是移住南邊小精舎與像異處相去二十步祇洹精舎本有七層諸國王人民競興供養懸繒幡葢散華燒香然燈續明日日不絶鼠銜燈炷燒花􅜖葢遂及精舎七重都盡諸國王人民皆大悲惱謂栴檀像已燒却後四五日開東天情舎戸忽見本像皆大歡喜共治精舎得作兩層遂移像本處法顯道整初到祇洹精舎念昔世尊住此二十五年自傷生在邊地共諸同志遊歴諸國而或有還者或有無常者今日乃見佛空處愴然心悲彼衆僧出問顯道言汝從何國來答云從漢地來彼衆僧歎曰善哉邊地之人乃能求法至此自相謂言我等諸師和尚相承已來未見漢道人來到此也精舎西北四里有榛名曰得眼本有五百盲人依精舎住此佛為説法盡還得眼盲人歡喜刺杖著地頭面作禮杖遂生長大世人重之無敢伐者遂成為榛是故以得眼爲名祇洹衆僧中食後多往彼榛中坐禪祇洹精舎東北六七里毗舎佉毋作精舎請佛及僧此處故在祇洹精舎大聚落有二門一門東向一門北向此園即須達長者布金錢買地處也精舎當中央佛住此處最久說法度人經行坐處亦盡起塔皆有名字乃孫陀利殺身謗佛處出祇洹東門北行七十步道西佛昔共九十六種外道論議國王大臣居士人民皆雲集而聽時外道女名旃􅃒摩那起嫉妬心及懐衣著腹前似若妊身於衆會中謗佛以非法於是天帝釋即化作白鼠齧其腰帯斷所懐衣墮地地即劈裂生入地獄及調達毒𤓰欲害佛生入地獄處後人皆標識之又於論議處起精舎精舎髙六丈許裏有坐佛其道東有外道天寺名曰影覆與論議處精舎夾道相對亦髙六丈許所以名影覆者日在西時世尊精舎影則映外道天寺日在東時外道天寺影則北映終不得映佛精舎也外道常遣人守其天寺掃灑燒香然燈供養至明旦其燈輒移在佛精舎中婆羅門恚言諸沙門取我燈自供養佛為爾不止婆羅門於是夜自伺候見其所事天神持燈繞佛精舎三帀供養佛已忽然不見婆羅門乃知佛神大即捨家入道傳云近有此事繞祇洹精舎有九十八僧伽藍盡有僧住處唯一處空此中國有九十六種外道皆知今世各有徒衆亦皆乞食但不持鉢亦復求福於曠路側立福徳舎屋宇床卧飲食供給行路人及出家人來去客但所期異耳調達亦有衆在供養過去三佛唯不供養釋迦文佛舎衛城東南四里瑠璃王欲伐舎夷國世尊當道側立立處起塔城西五十里到一邑名都維是迦葉佛本生處父子相見處般泥洹處皆悉起塔迦葉如來全身舎利亦起大塔從舎衛城東南行十二由延到一邑名那毗伽是拘樓秦佛所生處父子相見處般泥洹處亦有僧伽藍起塔從此北行減一由延到一邑是拘那含牟尼佛所生處父子相見處般泥洹處亦皆起塔從此東行減一由延到迦維羅衛城城中都無王民甚如坵荒只有衆僧民戸數十家而已白淨王故宫處作太子母形像乃太子乗白象入母胎時太子出城東門見病人迴車還處皆起塔阿夷相太子處與難陀等撲象捔射處箭東南去三十里入地令泉水出後世人治作井令行人飲之佛得道還見父王處五百釋子出家向優波離作禮地六種震動處佛為諸天説法四天王守四門父王不得入處佛在尼拘律樹下東向坐大愛道布施佛僧伽梨處此樹猶在瑠璃王殺釋種子釋種子先盡得須陀洹立塔今亦在城東北數里有王田太子樹下觀耕者處城東五十里有王園園名論民夫人入池洗浴出池北岸二十步舉手攀樹枝東向生太子太子墮地行七步二龍王浴太子身浴處遂作井及上洗浴池今衆僧常取飲之凡諸佛有四處常定一者成道處二者轉法輪處三者說法論議伏外道處四者上忉利天為母說法來下處餘則隨時示現焉迦維羅衛國大空荒人民稀疎道路怖畏白象師子不可妄行從佛生處東行五由延有國名藍莫此國王得佛一分舎利還歸起塔即名藍莫塔塔邊有池池中有龍常守護此塔晝夜供養阿育王出世欲破八塔作八萬四千塔破七塔已次欲破此塔龍便現身持阿育王入其宫中觀諸供養具已語王言汝供若能勝是便可壊之持去吾不與汝爭阿育王知其供養具非世之有於是便還此中荒蕪無人灑掃常有群象以鼻取水灑地取雜華香而供養塔諸國有道人來欲禮拜塔遇象大怖依樹自翳見象如法供養道人大自悲感此中無有僧伽藍可供養此塔乃令家灑掃道人即捨大戒還作沙彌自挽草木平治處所使得淨潔勸化國王作僧住處已爲寺今現有僧住此事在近自爾相承至今恒以沙彌為寺主從此東行三由延太子遣車匿白馬還處亦起塔從此東行四由延到炭塔亦有僧伽藍復東行十二由延到拘夷那竭城城北雙樹間希連河邊世尊於此北首而般泥洹及須跋最後得道處以金棺供養世尊七日處金剛力士放金杵處八王分舎利處諸處皆起塔有僧伽藍今悉現在其城中人民亦稀曠止有衆僧民戸從此東南行十二由延到諸梨車欲逐佛般泥洹處而佛不聽戀佛不肯去佛化作大深壍不得渡佛與鉢作信遣還其家立石柱上有銘題自此東行五由延到毗舎離國毗舎離城北大林重閣精舎佛住處及阿難半身塔其城裏本菴婆羅女家為佛起塔今故現在城南三里道西菴婆羅女以園施佛作佛住處佛將般泥洹與諸弟子出毗舎離城西門廻身右轉顧看毗舎離城告諸弟子是吾最後所行處後人於此處起塔城西北三里有塔名放弓仗以名此者恒水上流有一國王王小夫人生一肉胎大夫人妬之言汝生不祥之徴即盛以木函擲恒水中不流有國王遊觀見水上木函開看見千小兒端正􅌞特王即取養之遂便長大甚勇健所往征伐無不摧伏次伐父王本國王大愁憂小夫人問王何故愁憂王曰彼國王有千子勇健無比欲來伐吾國是以愁耳小夫人言王勿愁憂但於城東作髙樓賊來時置我樓上則我能却之王如其言至賊到時小夫人於樓上語賊言汝是我子何故作反逆事賊曰汝是何人云是我母小夫人曰汝等若不信者盡仰向張口小夫人即以兩手搆兩乳乳各作五百道墮千子口中賊知是我母即放弓仗二父王於是思惟皆得辟支佛二辟支佛塔猶在後世尊成道告諸弟子是吾昔時放弓仗處後人得知於此立塔故以名焉千小兒者即賢劫千佛是也佛於放弓仗塔邊告阿難言我却後三月當般泥洹魔王嬈固阿難使不得請佛住世從此東行三四里有塔佛般泥洹後百年有毗舎離比丘錯行戒律十事證言佛説如是爾時諸羅漢及持戒律比丘凡夫者有七百僧更檢校律藏後人於此處起塔今亦在從此東行四由延到五河合口阿難從摩竭國向毗舎離欲般涅槃諸天告阿闍世王即自嚴駕將士衆追到河上毗舎離諸梨車聞阿難來亦復來迎俱到河上阿難思惟前則阿闍世王致恨還則梨車復怨則於河中央入火光三昧燒身而般泥洹分身作二分一分在一岸邊於是二王各得半身舎利還歸起塔度河南下一由延到摩竭提國巴連弗邑巴連弗邑是阿育王所治城中王宫殿皆使鬼神作累石起墻闕彫文刻鏤非世所造今故現在阿育王弟得羅漢道常住耆闍崛山志樂閑静王敬心請於家供養以樂山静不肯受請王語弟言但受我請當為汝於城裏作山王乃具飲食召諸鬼神而告之曰明日悉受我請無坐席各自齎來明日諸大鬼神各持大石來辟方四五步坐訖即使鬼神累作大石山又於山底以五大方石作石室可長三丈廣二丈髙丈餘有一大乗婆羅門子名羅汰私婆迷住此城裏爽悟多智事無不達以清淨自居國王宗敬師事若往問訊不敢並坐王設以愛敬心執手執手已婆羅門輒自灌洗年可五十餘舉國瞻仰賴此一人𢎞宣佛法外道不能得加陵衆僧於阿育王塔邊造摩訶衍僧伽藍甚嚴麗亦有小乗寺都合六七百僧衆威儀庠序可觀四方髙徳沙門及學問人欲求義理皆詣此寺婆羅門子師亦名文􅌞師利國内大徳沙門諸大乗比丘皆宗仰焉亦住此僧伽藍凡諸中國唯此國城邑為大民人富盛競行仁義年年常以建卯月八日行像作四輪車縛竹作五層有承櫨揠㦸髙二丈餘許其狀如塔以白㲲纒上然後彩畫作諸天形像以金銀琉璃莊校其上懸繒􅜖葢四邊作龕皆有坐佛菩薩立侍可有二十車車車莊嚴各異當此日境内道俗皆集作倡伎樂華香供養婆羅門子來請佛佛次第入城入城内再宿通夜然燈伎樂供養國國皆爾其國長者居士各於城中立福徳醫藥舎凡國中貧窮孤獨殘跛一切病人皆詣此舎種種供給醫師看病隨宜飲食及湯藥皆令得安差者自去阿育王壞七塔作八萬四千塔最初所作大塔在城南三里餘此塔前有佛脚跡起精舎戸北向塔塔南有一石柱圍丈四五髙三丈餘上有銘題云阿育王以閻浮提布施四方僧還以錢贖如是三反塔北三四百步阿育王本於此作泥犂城中央有石柱亦髙三丈餘上有師子柱上有銘記作泥犂城因縁及年數日月從此東南行九由延至一小孤石山山頭有石室石室南向佛坐其中天帝釋將天樂般􅃒彈琴樂佛處帝釋以四十二事問佛一一以指畫石畫跡故在此中亦有僧伽藍從此西南行一由延到那羅聚落是舎利弗本生村舎利弗還於此村中般泥洹即此處起塔今亦現在從此西行一由延到王舎新城新城者是阿闍世王所造中有二僧伽藍出城西門三百步阿闍世王得佛一分舎利起塔髙大嚴麗出城南四里南向入谷至五山裏五山周圍狀若城郭即是䓑沙王舊城城東西可五六里南北七八里舎利弗目連初見頞鞞處尼犍子作火坑毒飯請佛處阿闍世王酒飲黑象欲害佛處城東北角曲中耆舊於菴婆羅園中起精舎請佛及千二百五十弟子供養處今故在其城中空荒無人住入谷搏山東南上十五里到耆闍崛山未至頭三里有石窟南向佛本於此坐禪西北三十步復有一石窟阿難於中坐禪天魔波旬化作鵰鷲住窟前恐阿難佛以神足力隔石舒手摩阿難肩怖即得止鳥跡手孔今悉存故曰鵰鷲窟山窟前有四佛坐處又諸羅漢各各有石窟坐禪處動有數百佛在石室前東西經行調逹於山北嶮巇間横擲石傷佛足指處石猶在佛說法堂已毁壞止有塼壁基在其山峰秀端嚴是五山中最髙法顯於新城中買香華油燈倩二舊比丘送法顯上耆闍崛山華香供養然燈續明慨然悲傷收淚而言佛昔於此住說首楞嚴法顯生不值佛但見遺跡處所而已即於石窟前誦首楞嚴停止一宿還向新城出舊城北行三百餘步道西迦蘭陀竹園精舎今現在衆僧掃灑精舎北二三里有尸摩賖那尸摩賖那者漢言棄死人墓田搏南山西行三百步有一石室名賓波羅窟佛食後常於此坐禪又西行五六里山北陰中有一石室名車帝佛泥洹後五百阿羅漢結集經處出經時鋪三空座莊嚴校飾舎利弗在左目連在右五百數中少一阿羅漢大迦葉為上座時阿難在門外不得入其處起塔今亦在搏山亦有諸羅漢坐禪石窟甚多出舊城北東下三里有調達石窟離此五十步有大方黑石昔有比丘在上經行思惟是身無常苦空得不淨觀厭患是身即捉刀欲自殺復念世尊制戒不得自殺又念雖爾我今但欲殺三毒賊便以刀自刎始傷再得須陀洹既半得阿那含斷已成阿羅漢果般泥洹從此西行四由延到伽耶城城内亦空荒復南行二十里到菩薩本苦行六年處處有林木從此西行三里到佛入水洗浴天按樹枝得攀出池處又北行二里得彌家女奉佛乳糜處從此北行二里佛於一大樹下石上東向坐食糜樹石今悉在石可廣長六尺高二尺許中國寒暑均調樹木或數千歳乃至萬歳從此東北行半由延到一石窟菩薩入中西向結跏趺坐心念若我成道當有神驗石壁上即有佛影現長三尺許今猶眀亮時天地大動諸天在空中白言此非過去當來諸佛成道處去此西南行減半由延貝多樹下是過去當來諸佛成道處諸天說是語已即便在前唱導導引而去菩薩起行離樹三十步天授吉祥草菩薩受之復行十五步五百青雀飛來繞菩薩三帀而去菩薩前到貝多樹下敷吉祥草東向而坐時魔王遣三玉女從北來試魔王自從南來試菩薩以足指按地魔兵退散三女變老自上苦行六年處及此諸處後人皆於中起塔立像今皆在佛成道已七日觀樹受解脱樂處佛於貝多樹下東西經行七日處諸天化作七寶屋供養佛七日處文鱗盲龍七日繞佛處佛於尼拘律樹下方石上東向坐梵天來請佛處四天王奉鉢處五百賈客授麨蜜處度迦葉兄弟師徒千人處此諸處亦起塔佛得道處有三僧伽藍皆有僧住衆僧民戸供給饒足無所乏少戒律嚴峻威儀坐起入衆之法佛在世時聖衆所行以至於今佛泥洹已來四大塔處相承不絶四大塔者佛生處得道處轉法輪處般泥洹處阿育王昔作小兒時當道戲遇釋迦佛行乞食小兒歡喜即以一掬土施佛佛持還泥經行地因此果報作鐵輪王王閻浮提乗鐵輪案行閻浮提見鐵圍兩山間地獄治罪人即問羣臣此是何等答言是鬼王閻羅治罪人王自念言鬼王尚能作地獄治罪人我是人主何不作地獄治罪人耶即問臣等誰能為我作地獄主治罪人者臣答言唯有極惡人能作耳王即遣臣遍求惡人見泄水邊有一長壯黑色髮黄眼青以脚鈎兼魚口哹禽獸禽獸來便射殺無得脫者得此人已將來與王王宻勑之汝作四方髙墻内殖種種華果并好谷池莊嚴校飾令人渇仰牢作門戸有人入者輒捉種種治罪莫使得出設使我入亦治罪莫放今拜汝作地獄主有比丘次第乞食入其門獄卒見之便欲治罪比丘惶怖求請須臾聽我中食俄頃得有人入獄卒内置碓臼中擣之赤沫出比丘見已思惟此身無常苦空如泡如沫即得阿羅漢既而獄卒捉内鑊湯中比丘心顔欣恱火滅湯冷中生蓮華比丘坐上獄卒即往白王獄中竒恠願王往看王言我前有要今不敢往獄卒言此非小事王宜疾往更改先要王即隨入比丘為說法王得信解即壞地獄悔前所作衆惡由是信重三寳常至貝多樹下悔過自責受八齋王夫人問王常遊何處羣臣答言恒在貝多樹下夫人伺王不在時遣人伐其樹倒王來見之迷悶躃地諸臣以水灑面良久乃蘓王即以塼累四邊以百甖牛乳灌樹根身四布地作是誓言若樹不生我終不起誓已樹便即根上而生以至於今今髙減十丈從此南三里行到一山名鷄足大迦葉今在此山中劈山下入入處不容人下入極遠有旁孔迦葉全身在此中住孔外有迦葉本洗手土彼方人若頭痛者以此土塗之即差此山中即日故有諸羅漢住彼方諸國道人年年往供養迦葉心濃至者夜即有羅漢來共言論釋其疑已忽然不現此山榛木茂盛又多師子虎狼不可妄行法顯還向巴連弗邑順恒水西下十由延得一精舎名曠野佛所住處今現有僧復順恒水西行十二由延到迦尸國波羅􅎄城城東北十里許得仙人鹿野苑精舎此苑本有辟支佛住常有野鹿栖宿世尊將成道諸天於空中唱言白淨王子出家學道却後七日當成佛辟支佛聞已即取泥洹故名此處為仙人鹿野苑世尊成道已後人於此處起精舎佛欲度拘驎等五人五人相謂言此瞿曇沙門本六年苦行日食一麻一米尚不得道况入人間恣身口意何道之有今日來者慎勿與語佛到五人皆起作禮處復北行六十步佛於此東向坐始轉法輪度拘驎等五人處其北二十步佛為彌勒授記處其南五十步翳羅鉢龍問佛我何時當得免此龍身此處皆起塔見在中有二僧伽藍悉有僧住自鹿野苑精舎西北行十三由延有國名拘睒彌其精舎名瞿師羅園佛昔住處今故有衆僧多小乗學從東行八由延佛本於此度惡鬼處亦嘗在此住經行坐處皆起塔亦有僧伽藍可百餘僧從此南行二百由延有國名達嚫是過去迦葉佛僧伽藍穿大石山作之凡有五重最下重作象形有五百間石室第二層作師子形有四百間第三層作馬形有三百間第四層作牛形有二百間第五層作鴿形有百間最上有泉水循石室前繞房而流周圍廻曲如是乃至下重順房流從戸而出諸層室中處處穿石作窻牖通眀室中朗然都無幽暗其室四角頭穿石作梯磴上處今人形小縁梯上正得至昔人一脚所躡處因名此寺為波羅越波羅越者天竺名鴿也其寺中常有羅漢住此土丘荒無人民居去山極遠方有村皆是邪見不識佛法沙門波羅門及諸異學彼國人民常見人飛來入此寺於時諸國道人欲來禮此寺者彼村人則言汝何以不飛耶我見此間道人皆飛道人方便答言翅未成耳達嚫國嶮道路艱難而知處欲往者要當齎錢貨施彼國王王然後遣人送展轉相付示其逕路法顯竟不得往承彼土人言故説之耳從波羅􅎄國東行還到巴連弗邑法顯本求戒律而北天竺諸國皆師師口傳無本可寫是以遠步乃至中天竺於此摩訶衍僧伽藍得一部律是摩訶僧祇衆律佛在世時最初大衆所行也於祇洹精舎傳其本自餘十八部各有師資大歸不異於小小不同或用開塞但此最是廣説備悉者復得一部抄律可七千偈是薩婆多衆律即此秦地衆僧所行者也亦皆師師口相傳授不書之於文字復於此衆中得雜阿毗曇心可六千偈又得一部綖經二千五百偈又得一卷方等般泥洹經可五千偈又得摩訶僧祇阿毗曇故法顯住此三年學梵書梵語寫律道整既到中國見沙門法則衆僧威儀觸事可觀乃追歎秦土邊地衆僧戒律殘缺誓言自今已去至得佛願不生邊地故遂停不歸法顯本心欲令戒律流通漢地於是獨還順恒水東下十八由延其南岸有瞻波大國佛精舎經行處及四佛坐處悉起塔現有僧住從此東行近五十由延到多摩梨帝國即是海口其國有二十四僧伽藍盡有僧住佛法亦興法顯住此二年寫經及畫像於是載商人大舶汎海西南行得冬初信風晝夜十四日到師子國彼國人云相去可七百由延其國在大洲上東西五十由延南北三十由延左右小洲乃有百數其間相去或十里二十里或二百里皆統屬大洲多出珍寳珠璣有出摩尼珠地方可十里王使人守護若有採者十分取三其國本無人民止有鬼神及龍居之諸國商人共市易市易時鬼神不自現身但出寳物題其價直商人則依價直直取物因商人來往住故諸國人聞其土樂悉亦復來於是遂成大國其國和適無冬夏之異草木常茂田種隨人無有時節佛至其國欲化惡龍以神足力一足躡王城北一足躡山頂兩跡相去十五由延於王城北跡上起大塔髙四十丈金銀莊校衆寳合成塔邊復起一僧伽藍名無畏山有五千僧起一佛殿金銀刻鏤悉以衆寶中有一青玉像髙二丈許通身七寶炎光威相嚴顯非言所載右掌中有一無價寶珠法顯去漢地積年所與交接悉異域人山川草木舉目無舊又同行分析或留或亡顧影唯已心常懐悲忽於此玉像邊見商人以晉地一白絹扇供養不覺悽然淚下滿目其國前王遣使中國取貝多樹子於佛殿旁種之髙可二十丈其樹東南傾王恐倒故以八九圍柱拄樹樹當拄處心生遂穿柱而下入地成根大可四圍許柱雖中裂猶裹在其外人亦不去樹下起精舎中有坐像道俗敬仰無倦城中又起佛齒精舎皆七寳作王淨修梵行城内人信敬之情亦篤其國立治已來無有飢荒喪亂衆僧庫藏多有珍寶無價摩尼其王入僧庫遊觀見摩尼珠即生貪心欲奪取之三日乃悟即詣僧中稽首悔前罪心告白僧言願僧立制自今已後勿聽王入其庫看比丘滿四十臘然後得入其城中多居士長者薩薄商人屋宇嚴麗巷陌平整四衢道頭皆作説法堂月八日十四日十五日鋪施髙座道俗四衆皆集聽法其國人云都可五六萬僧悉有衆食王别於城内供五六千人衆食須者則持本鉢往取隨器所容皆滿而還佛齒常以三月中出之未出十日王莊校大象使一辯説人著王衣服騎象上擊鼓喝言菩薩從三阿僧祇刧苦行不惜身命以國妻子及挑眼與人割肉貿鴿載頭布施投身餓虎不恡髓腦如是種種苦行為衆生故成佛在世四十九年説法教化令不安者安不度者度衆生縁盡乃般泥洹泥洹已來一千四百九十七年世間眼滅衆生長悲却後十日佛齒當出至無畏山精舎國内道俗欲植福者各各平治道路嚴飭巷陌辦衆華香供養之具如是唱已王便夾道兩邊作菩薩五百身已來種種變現或作須大拏或作睒變或作象王或作鹿馬如是形像皆彩畫莊校狀若生人然後佛齒乃出中道而行隨路供養到無畏精舎佛堂上道俗雲集燒香然燈種種法事晝夜不息滿九十日乃還城内精舎城内精舎至齊日則開門戸禮敬如法無畏精舎東四十里有一山山中有精舎名跋提可有二千僧僧中有一大徳沙門名達摩瞿諦其國人民皆共宗仰住一石室中四十許年常行慈心能感虵鼠使同止一室而不相害城南七里有一精舎名摩訶毗訶羅有三千僧住有一髙徳沙門戒行清潔國人咸疑是羅漢臨終之時王來省視依法集僧而問比丘得道耶其便以實答言是羅漢既終王即案經律以羅漢法𦵏之於精舎東四五里積好大薪縱廣可三丈餘髙亦爾近上著栴檀沈水諸香木四邊作階上持淨好白㲲周帀蒙􅚟上作大轝床似此間輲車但無龍魚耳當闍維時王及國人四衆咸集以華香供養從轝至墓所王自華香供養供養訖轝著􅚟上蘓油遍灌然後燒之火然之時人人敬心各脫上服及羽儀傘葢遙擲火中以助闍維闍維已即檢取骨即以起塔法顯至不及其生存唯見𦵏時王篤信佛法欲為衆僧作新精舎先設大㑹飯食僧供養已乃選好土牛一雙金銀寶物莊校角上作好金犂王自耕頃四邊然後割給民戸田宅書以鐵劵自是已後代代相承無敢廢易法顯在此國聞天竺道人於髙座上誦經云佛鉢本在毗舎離今在揵陀衛竟若千百年法顯聞誦之時有定歳數但今忘耳當復至西月氏國若千百年當至于闐國住若千百年當至屈茨國若千百年當復來到漢地住若千百年當復至師子國若千百年當還中天竺到中天已當上兠術天上彌勒菩薩見而歎曰釋迦文佛鉢至即共諸天華香供養七日七日已還閻浮提海龍王持入龍宫至彌勒將成道時鉢還分為四復本頻那山上彌勒成道已四天王當復應念佛如先佛法賢劫千佛共用此鉢鉢去已佛法漸滅佛法滅後人壽轉短乃至五歳十歳之時粳米酥油皆悉化滅人民極惡捉木則變成刀杖共相傷割殺其中有福者逃避入山惡人相殺盡已還復來出共相謂言昔人壽極長但為惡甚作諸非法故我等壽命遂爾短促乃至十歳我今共行諸善起慈悲心修行仁義如是各行仁義展轉壽倍乃至八萬歳彌勒出世初轉法輪時先度釋迦遺法弟子出家人及受三歸五戒齋法供養三寶者第二第三次度有縁者法顯爾時欲寫此經其人云此無經本我止口誦耳法顯住此國二年更求得彌沙塞律藏本得長阿含雜阿含復得一部雜藏此悉漢土所無者得此梵本已即載商人大船上可有二百餘人後係一小船海行艱險以備大船毁壞得好信風東下二日便值大風船漏水入商人欲趣小船小船上人恐人來多即斫絙斷商人大怖命在須臾恐船水漏即取麤財貨擲著水中法顯亦以軍持及澡灌并餘物棄擲海中但恐商人擲去經像唯一心念觀世音及歸命漢地衆僧我遠行求法願威神歸流得到所止如是大風晝夜十三日到一島邊潮退之後見船漏處即補塞之於是復前海中多有抄賊遇輒無全大海瀰漫無邊不識東西唯望日月星宿而進若陰雨時為逐風去亦無准當夜闇時但見大浪相搏晃然火色黿鼉水性怪異之屬商人荒遽不知那向海深無底又無下石住處至天晴已乃知東西還復望正而進若值伏石則無活路如是九十日許乃到一國名耶婆提其國外道婆羅門興盛佛法不足言停此國五月日復隨他商人大船上亦二百許人齎五十日糧以四月十六日發法顯於船上安居東北行趣廣州一月餘日夜鼓二時遇黑風暴雨商人賈客皆悉惶怖法顯爾時亦一心念觀世音及漢地衆僧䝉威神佑得至天暁暁已諸婆羅門議言坐載此沙門使我不利遭此大苦當下比丘置海島邊不可為一人令我等危嶮法顯本檀越言汝若下此比丘亦并下我不爾便當殺我汝其下此沙門吾到漢地當向國王言汝也漢地王亦敬信佛法重比丘僧諸商人躊躇不敢便下於時天多連陰海師相望僻誤遂經七十餘日糧食水漿欲盡取海鹹水作食分好水人可得二升遂便欲盡商人議言常行時正可五十日便到廣州爾今已過期多日將無僻耶即便西北行求岸晝夜十二日長廣郡界牢山南岸便得好水菜但經涉險難憂懼積日忽得至此岸見藜藿菜依然知是漢地然不見人民及行跡未知是何許或言未至廣州或言已過莫知所定即乗小船入浦覔人欲問其處得兩獵人即將歸令法顯譯語問之法顯先安慰之徐問汝是何人答言我是佛弟子又問汝入山何所求其便詭言眀當七月十五日欲取挑臘佛又問此是何國答言此青州長廣郡界統屬劉家聞已商人歡喜即乞其財物遣人往長廣太守李嶷敬信佛法聞有沙門持經像乗船汎海而至即將人從至海邊迎接經像歸至郡治商人於是還向揚州留法青州請法顯一冬一夏夏坐訖法顯逺離諸師久欲趣長安但所營事重遂便南下向都就諸師出經律法顯發長安六年到中國停六年還三年逹青州凡所遊歴減三十國沙河已西迄于天竺衆僧威儀法化之美不可詳説竊惟諸師未得備聞是以不顧㣲命浮海而還艱難具更幸䝉三尊威靈危而得濟故竹帛疏所經歴欲令賢者同其聞見闕是歳甲寅晉義熈十二年歳在壽星夏安居末迎法顯道人既至留共冬齋因講集之際重問遊歴其人㳟順言輒依實由是先所略者勸令詳載顯復具叙始末自云顧尋所經不覺心動汗流所以乗危履險不惜此形者盖是志有所存専其愚直故投命於不必全之地以達萬一之冀於是感歎斯人以為古今罕有自大教東流未有忘身求法如顯之比然後知誠之所感無窮否而不通志之所奬無功業而不成成夫功業者豈不由忘夫所重重夫所忘者哉佛國記
