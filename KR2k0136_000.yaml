body:
  text: 佛國記地理類十外紀之屬提要臣等謹案佛國記一卷宋釋法顯撰杜佑通典引此書又作法明蓋中宗諱顯唐人以明字代之故原注有國諱改焉四字也法顯晉義熙中自長安遊天竺經三十餘國還到京與天竺禪師參互辨定以成是書胡震亨刻入祕册函中從舊題曰佛國記而震亨附跋則以為當名法顯傳今考酈道元水經注引此書所云于此順嶺西南行十五日以下八十九字又引恆水上流有一國以下二百七十六字皆稱曰法顯傳則震亨之説似為有據然隋志雜傳類中載法顯傳二卷法顯行傳一卷不著撰人地理類載佛國記一卷注曰沙門釋法顯撰一書兩收三名互見則亦不必定改法顯傳也其書以天竺為中國以中國為邊地蓋釋氏自尊其教其誕謬不足與爭又于闐即今和闐自古以來崇回回教法欽定西域圖志考證甚明而此書載其有十四僧伽藍衆僧數萬人則所記亦不必盡實然六朝舊笈流傳頗久其敘述古雅亦非後來行記所及存廣異聞亦無不可也書中稱宏始三年嵗在己亥案晉書姚萇宏始二年為晉隆安四年當稱庚子所紀較前差一年然晉書本紀載趙石虎建武六年當咸康五年嵗在己亥而金石録載趙橫山李君神碑及西門豹祠殿基記乃均作建武六年庚子復後差一年蓋其時諸國紛爭或踰年改元或不踰年改元漫無定制又南北隔絶傳聞異詞未可斷史之必是此之必非今仍其舊文以從闕疑之義焉乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c6609e117047de0d59964e9c809afc4345c5b0cc98f7a6489ed2fcdb9a641fb5
